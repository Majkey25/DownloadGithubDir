<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DownloadGithubDir</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg?v=5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=6">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./">DownloadGithubDir</a>
    <nav class="nav">
      <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener noreferrer">GitHub API</a>
      <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
    </nav>
  </header>

  <main>
    <section class="workspace" aria-labelledby="hero-title">
      <div class="intro">
        <h1 id="hero-title">Download a<br>GitHub folder</h1>
        <p class="lede">
          Paste a folder URL. Get a ZIP.<br>No app server or saved token.
        </p>
      </div>

      <div class="examples">
        <h2>Try an example</h2>
        <div id="sample-links"></div>
      </div>

      <form id="download-form" class="form" novalidate>
        <div class="field">
          <label for="input">GitHub folder URL <span class="required" aria-hidden="true">*</span></label>
          <input id="input" name="input" type="url" autocomplete="url"
            placeholder="https://github.com/owner/repo/tree/branch/path"
            aria-invalid="false" required>
        </div>

        <div class="field">
          <label for="branch">Branch or tag <span>(optional)</span></label>
          <input id="branch" name="branch" autocomplete="off" placeholder="e.g., main, develop, v1.0.0">
        </div>

        <div class="field">
          <label for="token">Personal access token <span>(optional)</span></label>
          <input id="token" name="token" autocomplete="off" placeholder="ghp_…" type="password"
            aria-describedby="token-hint">
          <p class="hint" id="token-hint">Used only for this download.</p>
        </div>

        <button class="submit" type="submit" id="submit">Download ZIP</button>

        <div class="status" id="status" data-state="ready">
          <div class="status-text" id="status-text" role="status">Ready to download</div>
          <div class="progress-wrap" id="progress-wrap" role="progressbar"
            aria-label="Download progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="progress" id="progress"></div>
          </div>
        </div>
      </form>
    </section>

    <section class="info-rail" aria-label="Product details">
      <div class="info-item">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M8 8 3 12l5 4M16 8l5 4-5 4M14 4l-4 16" />
        </svg>
        <p><strong>How it works</strong><span>Git Trees API → files → ZIP</span></p>
      </div>
      <div class="info-item">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <rect x="5" y="10" width="14" height="11" rx="1" />
          <path d="M8 10V7a4 4 0 0 1 8 0v3" />
        </svg>
        <p><strong>Bounded in-browser</strong><span>Up to 4,000 files / 250 MiB.</span></p>
      </div>
    </section>
  </main>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
    integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"
    integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module" src="assets/app.js?v=8"></script>
</body>
</html>
